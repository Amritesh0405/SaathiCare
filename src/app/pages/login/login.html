<div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <h2>🤝 SaathiCare</h2>
        <p>Login to your account</p>
      </div>
  
      <form (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" [(ngModel)]="form.phone"
            name="phone" placeholder="+91 98765 43210" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" [(ngModel)]="form.password"
            name="password" placeholder="Your password" required />
        </div>
  
        <div class="error" *ngIf="errorMsg">{{ errorMsg }}</div>
        <div class="success" *ngIf="successMsg">{{ successMsg }}</div>
  
        <button type="submit" class="btn-submit"
          [disabled]="loading">
          {{ loading ? 'Logging in...' : 'Login' }}
        </button>
      </form>
  
      <p class="auth-link">
        Don't have an account?
        <a routerLink="/register">Register here</a>
      </p>
      <p class="auth-link">
        Are you a helper?
        <a routerLink="/register">Join as Helper</a>
      </p>
    </div>
  </div>
